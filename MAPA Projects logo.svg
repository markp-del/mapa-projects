<svg width="420" height="140" viewBox="0 0 420 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MAPA Projects — Project Management">
  <defs>
    <style>
      .wm   { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 800; letter-spacing: 1px; }
      .pj   { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; letter-spacing: 6px; }
      .tag  { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; letter-spacing: 4.5px; }
    </style>
  </defs>

  <!-- Mark: modular site-plan grid, one accent cell -->
  <g transform="translate(8,30)">
    <rect x="0" y="0" width="80" height="80" rx="10" fill="none" stroke="#191C22" stroke-width="4"/>
    <line x1="40" y1="6" x2="40" y2="74" stroke="#191C22" stroke-width="3"/>
    <line x1="6" y1="40" x2="74" y2="40" stroke="#191C22" stroke-width="3"/>
    <rect x="44" y="6" width="30" height="30" rx="4" fill="#B26B3F"/>
  </g>

  <!-- Wordmark -->
  <text x="108" y="62" class="wm" font-size="44" fill="#191C22">MAPA</text>
  <text x="250" y="62" class="pj" font-size="30" fill="#6B7079">Projects</text>

  <!-- divider -->
  <line x1="110" y1="80" x2="404" y2="80" stroke="#E2DED5" stroke-width="2"/>

  <!-- tagline -->
  <text x="110" y="104" class="tag" font-size="15" fill="#B26B3F">PROJECT MANAGEMENT</text>
</svg>
